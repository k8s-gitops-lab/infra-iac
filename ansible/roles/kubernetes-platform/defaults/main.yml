---
# gateway_api_version, metallb_chart_version, metallb_addresses et
# traefik_chart_version sont declares dans group_vars/all.yml (source de
# verite synchronisee avec control-plane/platform.yml) : ne pas les
# redeclarer ici, group_vars a de toute facon une precedence plus haute que
# les defaults de role et masquerait silencieusement toute modification
# faite ici.
helm_version: "3.18.6"
helm_arch: "{{ 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'amd64' }}"
helm_binary_path: /usr/local/bin/helm

local_path_provisioner_version: "v0.0.31"
local_path_provisioner_namespace: local-path-storage
local_path_storage_class_name: local-path

metallb_namespace: metallb-system
metallb_pool_name: vagrant-pool
metallb_l2_advertisement_name: vagrant-l2

traefik_namespace: traefik
traefik_dashboard_host: dashboard.localhost

traefik_gateway_name: traefik-gateway
traefik_gateway_namespace: default
traefik_gateway_listener_port: 8000
traefik_gateway_tls_listener_port: 8443
traefik_gateway_tls_secret_name: nip-io-wildcard-tls
traefik_gateway_tls_days: 3650
