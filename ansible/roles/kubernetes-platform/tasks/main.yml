---
- name: Create platform manifest working directory
  ansible.builtin.file:
    path: /tmp/kubernetes-platform
    state: directory
    mode: '0755'
  tags:
    - kubernetes-platform
    - platform
    - platform-render

- name: Install Helm archive
  ansible.builtin.unarchive:
    src: "https://get.helm.sh/helm-v{{ helm_version }}-linux-{{ helm_arch }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/linux-{{ helm_arch }}/helm"
  tags:
    - kubernetes-platform
    - platform
    - helm

- name: Install Helm binary
  ansible.builtin.copy:
    src: "/tmp/linux-{{ helm_arch }}/helm"
    dest: "{{ helm_binary_path }}"
    remote_src: true
    mode: '0755'
  tags:
    - kubernetes-platform
    - platform
    - helm

# Manifest multi-ressources (plusieurs CRDs) : un test de sous-chaîne sur la
# sortie ne peut pas donner un changed/pas-changed fiable pour l'ensemble
# (cf. Install local-path-provisioner et Apply MetalLB address pool
# ci-dessous, même remarque). On assume "changed" par défaut.
- name: Install Gateway API CRDs
  ansible.builtin.command: >-
    kubectl apply -f
    https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ gateway_api_version }}/standard-install.yaml
  register: gateway_api_apply
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - gateway-api

# Manifest multi-ressources (namespace, serviceaccount, clusterrole(binding),
# configmap, deployment, storageclass) : même remarque que ci-dessus.
- name: Install local-path-provisioner
  ansible.builtin.command: >-
    kubectl apply -f
    https://raw.githubusercontent.com/rancher/local-path-provisioner/{{ local_path_provisioner_version }}/deploy/local-path-storage.yaml
  register: local_path_apply
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - storage
    - local-path

- name: Wait for local-path-provisioner
  ansible.builtin.command: >-
    kubectl -n {{ local_path_provisioner_namespace }}
    rollout status deployment/local-path-provisioner --timeout=180s
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - storage
    - local-path

- name: Set local-path as default StorageClass
  ansible.builtin.command: >-
    kubectl annotate storageclass {{ local_path_storage_class_name }}
    storageclass.kubernetes.io/is-default-class=true --overwrite
  register: local_path_default
  changed_when: "'not annotated' not in local_path_default.stderr"
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - storage
    - local-path

- name: Add MetalLB Helm repository
  ansible.builtin.command: "{{ helm_binary_path }} repo add metallb https://metallb.github.io/metallb --force-update"
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - helm
    - metallb

- name: Add Traefik Helm repository
  ansible.builtin.command: "{{ helm_binary_path }} repo add traefik https://traefik.github.io/charts --force-update"
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - helm
    - traefik

- name: Add Jetstack Helm repository
  ansible.builtin.command: "{{ helm_binary_path }} repo add jetstack https://charts.jetstack.io --force-update"
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - helm
    - cert-manager

- name: Update Helm repositories
  ansible.builtin.command: "{{ helm_binary_path }} repo update"
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - helm
    - metallb
    - traefik
    - cert-manager

- name: Render MetalLB config
  ansible.builtin.template:
    src: metallb-config.yaml.j2
    dest: /tmp/kubernetes-platform/metallb-config.yaml
    mode: '0644'
  tags:
    - kubernetes-platform
    - platform
    - platform-render
    - metallb

- name: Render Traefik values
  ansible.builtin.template:
    src: traefik-values.yaml.j2
    dest: /tmp/kubernetes-platform/traefik-values.yaml
    mode: '0644'
  tags:
    - kubernetes-platform
    - platform
    - platform-render
    - traefik

- name: Render shared Gateway
  ansible.builtin.template:
    src: gateway.yaml.j2
    dest: /tmp/kubernetes-platform/gateway.yaml
    mode: '0644'
  tags:
    - kubernetes-platform
    - platform
    - platform-render
    - gateway

- name: Render cert-manager self-signed CA and ClusterIssuer
  ansible.builtin.template:
    src: cert-manager-cluster-issuer.yaml.j2
    dest: /tmp/kubernetes-platform/cert-manager-cluster-issuer.yaml
    mode: '0644'
  tags:
    - kubernetes-platform
    - platform
    - platform-render
    - cert-manager
    - tls

- name: Render wildcard Certificate for shared Gateway
  ansible.builtin.template:
    src: wildcard-certificate.yaml.j2
    dest: /tmp/kubernetes-platform/wildcard-certificate.yaml
    mode: '0644'
  tags:
    - kubernetes-platform
    - platform
    - platform-render
    - gateway
    - tls

- name: Install MetalLB
  ansible.builtin.command: >-
    {{ helm_binary_path }} upgrade --install metallb metallb/metallb
    --namespace {{ metallb_namespace }}
    --create-namespace
    --version {{ metallb_chart_version }}
  register: metallb_helm
  changed_when: "'Release' in metallb_helm.stdout"
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - metallb

- name: Wait for MetalLB controller
  ansible.builtin.command: >-
    kubectl -n {{ metallb_namespace }}
    rollout status deployment/metallb-controller --timeout=180s
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - metallb

- name: Wait for MetalLB CRDs
  ansible.builtin.command: kubectl wait --for=condition=Established crd/ipaddresspools.metallb.io --timeout=120s
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - metallb

# Manifest à deux ressources (IPAddressPool + L2Advertisement) : même remarque
# que pour Install Gateway API CRDs ci-dessus.
- name: Apply MetalLB address pool
  ansible.builtin.command: kubectl apply -f /tmp/kubernetes-platform/metallb-config.yaml
  register: metallb_config_apply
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - metallb

- name: Install Traefik
  ansible.builtin.command: >-
    {{ helm_binary_path }} upgrade --install traefik traefik/traefik
    --namespace {{ traefik_namespace }}
    --create-namespace
    --version {{ traefik_chart_version }}
    -f /tmp/kubernetes-platform/traefik-values.yaml
  register: traefik_helm
  changed_when: "'Release' in traefik_helm.stdout"
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - traefik

- name: Wait for Traefik
  ansible.builtin.command: >-
    kubectl -n {{ traefik_namespace }}
    rollout status deployment/traefik --timeout=180s
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - traefik

- name: Install cert-manager
  ansible.builtin.command: >-
    {{ helm_binary_path }} upgrade --install cert-manager jetstack/cert-manager
    --namespace {{ cert_manager_namespace }}
    --create-namespace
    --version {{ cert_manager_chart_version }}
    --set crds.enabled=true
  register: cert_manager_helm
  changed_when: "'Release' in cert_manager_helm.stdout"
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - cert-manager

- name: Wait for cert-manager controller
  ansible.builtin.command: >-
    kubectl -n {{ cert_manager_namespace }}
    rollout status deployment/cert-manager --timeout=180s
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - cert-manager

- name: Wait for cert-manager webhook
  ansible.builtin.command: >-
    kubectl -n {{ cert_manager_namespace }}
    rollout status deployment/cert-manager-webhook --timeout=180s
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - cert-manager

- name: Wait for cert-manager cainjector
  ansible.builtin.command: >-
    kubectl -n {{ cert_manager_namespace }}
    rollout status deployment/cert-manager-cainjector --timeout=180s
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - cert-manager

# Manifest multi-ressources (Issuer + Certificate CA + ClusterIssuer) : meme
# remarque que pour Install Gateway API CRDs ci-dessus, on assume "changed".
- name: Apply cert-manager self-signed CA and ClusterIssuer
  ansible.builtin.command: kubectl apply -f /tmp/kubernetes-platform/cert-manager-cluster-issuer.yaml
  register: cert_manager_issuer_apply
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - cert-manager
    - tls

- name: Wait for internal CA ClusterIssuer to be ready
  ansible.builtin.command: >-
    kubectl wait --for=condition=Ready
    clusterissuer/{{ cert_manager_cluster_issuer_name }} --timeout=120s
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - cert-manager
    - tls

- name: Apply wildcard Certificate for shared Gateway
  ansible.builtin.command: kubectl apply -f /tmp/kubernetes-platform/wildcard-certificate.yaml
  register: wildcard_certificate_apply
  changed_when: "'unchanged' not in wildcard_certificate_apply.stdout"
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - gateway
    - tls

- name: Wait for wildcard Certificate to be issued
  ansible.builtin.command: >-
    kubectl -n {{ traefik_gateway_namespace }} wait --for=condition=Ready
    certificate/{{ traefik_gateway_tls_secret_name }} --timeout=120s
  changed_when: false
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - gateway
    - tls

- name: Apply shared Gateway
  ansible.builtin.command: kubectl apply -f /tmp/kubernetes-platform/gateway.yaml
  register: gateway_apply
  changed_when: "'unchanged' not in gateway_apply.stdout"
  run_once: true
  tags:
    - kubernetes-platform
    - platform
    - gateway
